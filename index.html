<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nachgekocht.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3ED;
    --dark: #1C1A17;
    --warm: #8B4513;
    --accent: #D47B3F;
    --muted: #9B8E82;
    --green: #4A7C59;
    --light-border: #E2D9CF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── MAIN LAYOUT ── */
  #app { display: block; }

  /* ── HEADER ── */
  header {
    padding: 0;
    background: none;
  }

  /* ── NAV ── */
  nav {
    background: white;
    border-bottom: 1px solid var(--light-border);
    padding: 0 2rem;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky; top: 0; z-index: 100;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    background: none; border: none;
    padding: 1rem 1.25rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .nav-btn:hover { color: var(--dark); }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── MAIN CONTENT ── */
  main { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }

  .category-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
    color: var(--dark);
  }
  .category-desc {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }

  /* ── RECIPE GRID ── */
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .recipe-card {
    background: white;
    border: 1px solid var(--light-border);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .recipe-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  }
  .recipe-card.empty { opacity: 0.5; cursor: default; }
  .recipe-card.empty:hover { transform: none; box-shadow: none; }

  .card-img {
    height: 180px;
    background: var(--light-border);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    color: var(--muted);
  }
  .card-img-placeholder svg { opacity: 0.4; }
  .card-img-placeholder span { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; }

  .card-status {
    position: absolute; top: 0.75rem; right: 0.75rem;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3rem 0.65rem;
    border-radius: 2px;
  }
  .status-done {
    background: var(--green);
    color: white;
  }
  .status-pending {
    background: rgba(255,255,255,0.9);
    color: var(--muted);
    border: 1px solid var(--light-border);
  }

  .card-body { padding: 1.25rem; }
  .card-body h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 0.4rem;
    line-height: 1.3;
  }
  .card-meta {
    display: flex; gap: 1rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .card-meta span { display: flex; align-items: center; gap: 0.3rem; }

  /* ── RECIPE DETAIL ── */
  #recipe-detail {
    display: none;
    max-width: 800px;
    margin: 0 auto;
  }

  .back-btn {
    background: none; border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 2rem;
    padding: 0;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--dark); }

  .detail-header {
    margin-bottom: 2.5rem;
  }
  .detail-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .detail-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    line-height: 1.15;
    margin-bottom: 1rem;
  }
  .detail-badges {
    display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem;
  }
  .badge {
    background: var(--cream);
    border: 1px solid var(--light-border);
    padding: 0.35rem 0.85rem;
    font-size: 0.78rem;
    border-radius: 2px;
    color: var(--dark);
  }
  .badge.green { background: #EBF5EF; border-color: #B8D9C4; color: var(--green); }

  .detail-photo {
    width: 100%;
    height: 350px;
    background: var(--light-border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 2.5rem;
    overflow: hidden;
    position: relative;
  }
  .photo-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
    color: var(--muted);
  }
  .photo-placeholder p { font-size: 0.85rem; }

  .detail-stamp {
    position: absolute; top: 1.5rem; right: 1.5rem;
    background: var(--green);
    color: white;
    padding: 0.5rem 1rem;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 2px;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 3rem;
  }
  @media (max-width: 600px) {
    .detail-grid { grid-template-columns: 1fr; }
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .ingredient-list { list-style: none; }
  .ingredient-list li {
    display: flex; justify-content: space-between;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--light-border);
    font-size: 0.9rem;
  }
  .ingredient-list li:last-child { border-bottom: none; }
  .ingredient-list .amount { color: var(--muted); font-weight: 300; }

  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li {
    counter-increment: steps;
    display: flex; gap: 1rem;
    margin-bottom: 1.25rem;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .steps-list li::before {
    content: counter(steps);
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--light-border);
    font-weight: 700;
    line-height: 1;
    min-width: 1.5rem;
  }

  .macros-bar {
    background: var(--dark);
    border-radius: 4px;
    padding: 1.5rem;
    margin-top: 2.5rem;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    text-align: center;
  }
  .macro-item { color: white; }
  .macro-val {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--accent);
  }
  .macro-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  .note-box {
    background: #FFF8F0;
    border-left: 3px solid var(--accent);
    padding: 1rem 1.25rem;
    margin-top: 2rem;
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--dark);
    border-radius: 0 4px 4px 0;
  }
  .note-box strong { color: var(--warm); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--light-border);
    margin-top: 4rem;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.35s ease forwards; }
</style>
</head>

  'schoko-oatcake': { title: 'Schoko Oatcake Low Fat', category: 'Desserts', time: '45 min', servings: '9 Stücke', done: false },
  'schokodessert': { title: 'Schokodessert Creme', category: 'Desserts', time: '10 min', servings: '2 Portionen', done: false },
  'oreo-muffins': { title: 'Oreo Protein Muffins', category: 'Desserts', time: '55 min', servings: '6 Stück', done: false },
};

// ── UI FUNCTIONS ──
let currentCat = 'italienisch';

function showCategory(key, el) {
  currentCat = key;
  const cat = categories[key];
  document.getElementById('cat-title').textContent = cat.title;
  document.getElementById('cat-desc').textContent = cat.desc;

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');

  const grid = document.getElementById('recipe-grid');
  grid.innerHTML = '';
  cat.recipes.forEach(id => {
    const r = recipes[id];
    if (!r) return;
    const card = document.createElement('div');
    card.className = 'recipe-card fade-in' + (r.done ? '' : ' empty');
    card.innerHTML = `
      <div class="card-img">
        ${r.photo
          ? `<img src="${r.photo}" alt="${r.title}">`
          : `<div class="card-img-placeholder">
               <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
               <span>Foto folgt</span>
             </div>`
        }
        <div class="card-status ${r.done ? 'status-done' : 'status-pending'}">
          ${r.done ? '✓ Nachgekocht' : 'Ausstehend'}
        </div>
      </div>
      <div class="card-body">
        <h3>${r.title}</h3>
        <div class="card-meta">
          <span>⏱ ${r.time}</span>
          <span>👥 ${r.servings}</span>
        </div>
      </div>
    `;
    if (r.done && r.steps) {
      card.onclick = () => openDetail(id);
    }
    grid.appendChild(card);
  });

  document.getElementById('category-view').style.display = 'block';
  document.getElementById('recipe-detail').style.display = 'none';
}

function openDetail(id) {
  const r = recipes[id];
  if (!r || !r.steps) return;

  const html = `
    <div class="detail-header">
      <div class="detail-eyebrow">${r.category}</div>
      <h2>${r.title}</h2>
      <div class="detail-badges">
        <span class="badge">⏱ ${r.time}</span>
        <span class="badge">👥 ${r.servings}</span>
        ${r.done ? `<span class="badge green">✓ Nachgekocht · ${r.doneDate}</span>` : ''}
      </div>
    </div>

    <div class="detail-photo">
      ${r.photo
        ? `<img src="${r.photo}" alt="${r.title}" style="width:100%;height:100%;object-fit:cover;">`
        : `<div class="photo-placeholder">
             <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
             <p>Eigenes Foto folgt beim nächsten Kochen</p>
           </div>`
      }
      ${r.done ? '<div class="detail-stamp">✓ Nachgekocht</div>' : ''}
    </div>

    <div class="detail-grid">
      <div>
        <div class="section-label">Zutaten</div>
        <ul class="ingredient-list">
          ${r.ingredients.map(i => `<li><span>${i.name}</span><span class="amount">${i.amount}</span></li>`).join('')}
        </ul>
      </div>
      <div>
        <div class="section-label">Zubereitung</div>
        <ol class="steps-list">
          ${r.steps.map(s => `<li><span>${s}</span></li>`).join('')}
        </ol>
      </div>
    </div>

    ${r.macros ? `
    <div class="macros-bar">
      <div class="macro-item"><div class="macro-val">${r.macros.kcal}</div><div class="macro-label">Kalorien</div></div>
      <div class="macro-item"><div class="macro-val">${r.macros.protein}</div><div class="macro-label">Protein</div></div>
      <div class="macro-item"><div class="macro-val">${r.macros.carbs}</div><div class="macro-label">Carbs</div></div>
      <div class="macro-item"><div class="macro-val">${r.macros.fat}</div><div class="macro-label">Fett</div></div>
    </div>` : ''}

    ${r.note ? `<div class="note-box">${r.note}</div>` : ''}
  `;

  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('category-view').style.display = 'none';
  const detail = document.getElementById('recipe-detail');
  detail.style.display = 'block';
  detail.classList.add('fade-in');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeDetail() {
  document.getElementById('recipe-detail').style.display = 'none';
  document.getElementById('category-view').style.display = 'block';
}

// Seite direkt mit erster Kategorie starten
showCategory('italienisch');
</script>
</body>
</html>
